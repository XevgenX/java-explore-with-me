server:
  port: 8080
spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:mem:ewm;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: ewm
    password: ewm