server:
  port: 9090
spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:mem:stat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: stat
    password: stat